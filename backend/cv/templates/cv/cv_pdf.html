<!doctype html>
{% load static %}
<html lang="{{ lang }}">
<head>
    <meta charset="utf-8">
    <title>jhek-cv</title>
    <link rel="stylesheet" href="{% static 'css/site.css' %}">
    <style>
        @page {
            size: A4;
            margin: 14mm 16mm;
        }

        html { font-size: 9pt; }

        body {
            background: #fff;
            line-height: 1.4;
        }

        .content { padding: 0; max-width: 100%; }
        .cv-toolbar, .site-header, .site-footer { display: none !important; }
        a { color: var(--text); text-decoration: none; }

        /* Tighter heading sizes for print */
        h1 { font-size: 16pt; margin-bottom: 2pt; }
        h4 { font-size: 10pt; }
        h5 { font-size: 9pt; }
        h6 { font-size: 8pt; }

        /* Contact info on one tight line */
        .cv-contact { margin-bottom: 4pt; font-size: 8pt; }

        /* Intro paragraph — compact */
        .cv-intro {
            margin-bottom: 6pt;
            font-size: 8.5pt;
            line-height: 1.35;
        }

        /* Section headings — tight */
        .cv-section-heading {
            border-top: 1px solid #333;
            padding-top: 5pt;
            margin-bottom: 5pt;
            font-size: 10pt;
        }

        /* Entry grid — tighter columns and spacing */
        .cv-entry {
            grid-template-columns: 4.5rem 1fr;
            gap: 0 8pt;
            margin-bottom: 4pt;
            padding-bottom: 4pt;
        }

        .cv-dates { font-size: 7.5pt; line-height: 1.3; padding-top: 1pt; }

        .cv-entry-body h5 { margin-bottom: 0; }
        .cv-entry-body h6 { margin-bottom: 1pt; font-size: 8pt; }
        .cv-entry-body ul { margin-top: 1pt; padding-left: 12pt; }
        .cv-entry-body li { font-size: 8pt; margin-bottom: 1pt; line-height: 1.3; }

        /* Skills grid — force 3 columns */
        .cv-skills {
            grid-template-columns: repeat(3, 1fr);
            gap: 1pt 8pt;
            margin-bottom: 6pt;
        }
        .cv-skills li { font-size: 8pt; }
        .dot-filled, .dot-empty { width: 4px; height: 4px; }
        .cv-dots { gap: 2px; }

        /* Recommenders — tight */
        .cv-recommender {
            margin-bottom: 3pt;
            padding-bottom: 3pt;
        }
        .cv-recommender h5 { font-size: 9pt; }
        .cv-recommender h6 { font-size: 8pt; }
        .cv-rec-contact { font-size: 8pt; }

        /* Page break control */
        h1, h4, h5 { page-break-after: avoid; }
        .cv-entry { page-break-inside: avoid; }
        .cv-recommender { page-break-inside: avoid; }
        .cv-section { page-break-inside: avoid; }
    </style>
</head>
<body>
<main class="content content--wide">
    {% include "cv/_cv_body.html" %}
</main>
</body>
</html>
