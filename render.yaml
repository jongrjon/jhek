databases:
  - name: jhek-db
    plan: free
    databaseName: jhek
    user: jhek

services:
  - type: web
    name: jhek
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DATABASE_URL
        fromDatabase:
          name: jhek-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: jhek.is,www.jhek.is,jhek.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://jhek.is,https://www.jhek.is,https://jhek.onrender.com
      - key: CV_DEFAULT_LANGUAGE
        value: is
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
