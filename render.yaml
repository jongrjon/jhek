databases:
  - name: jhek-db
    plan: free
    databaseName: jhek
    user: jhek

services:
  - type: web
    name: jhek
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DATABASE_URL
        fromDatabase:
          name: jhek-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: CV_DEFAULT_LANGUAGE
        value: is
